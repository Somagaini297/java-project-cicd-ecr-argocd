name: Deploy Java App to ECS

on:
 push:
  branches:
   - master

env:
 AWS_REGION: us-east-1
 ECR_REPOSITORY: myapp-repo
 ECS_STACK_NAME: java-app-ecs-stack

jobs:
 build-and-deploy:
  runs-on: ubuntu-latest


  steps:
   - name: Checkout Code
     uses: actions/checkout@v3

   - name: Set up JDK 17
     uses: actions/setup-java@v3
     with:
       distribution: 'temurin'
       java-version: '17'

   - name: Build with Maven
     run: mvn clean package -DskipTests

   - name: Configure AWS Credentials
     uses: aws-actions/configure-aws-credentials@v2
     with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ env.AWS_REGION }}

   - name: Verify AWS Identity (Debug)
     run: aws sts get-caller-identity

   - name: Login to Amazon ECR
     uses: aws-actions/amazon-ecr-login@v1

   - name: Build Docker Image
     run: docker build -t $ECR_REPOSITORY .

   - name: Tag Docker Image
     run: |
      docker tag $ECR_REPOSITORY:latest \
      ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$ECR_REPOSITORY:latest

   - name: Push Docker Image to ECR
     run: |
      docker push \
      ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/$ECR_REPOSITORY:latest

  # Uncomment when your CFT is ready
   - name: Deploy CloudFormation
     run: |
      aws cloudformation deploy \
      --template-file ecs-cft.yaml \
      --stack-name $ECS_STACK_NAME \
      --capabilities CAPABILITY_NAMED_IAM \
      --parameter-overrides file://ecs-cft.json

