name: Deploy Java App to ECS

on:
push:
branches:
- main

env:
AWS_REGION: us-east-1
ECR_REPOSITORY: myapp-repo
ECS_STACK_NAME: myapp-ecs-stack

jobs:
build-and-deploy:
runs-on: ubuntu-latest

```
steps:
- name: Checkout Code
  uses: actions/checkout@v3

- name: Set up JDK
  uses: actions/setup-java@v3
  with:
    distribution: 'temurin'
    java-version: '17'

- name: Build with Maven
  run: mvn clean package -DskipTests

- name: Configure AWS Credentials
  uses: aws-actions/configure-aws-credentials@v2
  with:
    aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
    aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    aws-region: ${{ env.AWS_REGION }}

- name: Login to ECR
  run: |
    aws ecr get-login-password --region $AWS_REGION \
    | docker login --username AWS \
    --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

- name: Build Docker Image
  run: |
    docker build -t $ECR_REPOSITORY .
    docker tag $ECR_REPOSITORY:latest \
    ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

- name: Push to ECR
  run: |
    docker push \
    ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:latest

